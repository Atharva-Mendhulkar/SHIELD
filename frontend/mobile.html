<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>INDRA BANK | Secure Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            gold: '#F59E0B',
                            slate: '#0F172A',
                            accent: '#3B82F6'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Manrope', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-glow { box-shadow: 0 0 20px rgba(245, 158, 11, 0.15); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page-transition { transition: all 0.3s ease-in-out; }
        @keyframes pulse-gold { 
            0%, 100% { border-color: rgba(245, 158, 11, 0.2); box-shadow: 0 0 5px rgba(245, 158, 11, 0.1); }
            50% { border-color: rgba(245, 158, 11, 0.5); box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); }
        }
        .shield-active { animation: pulse-gold 3s infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased selection:bg-brand-gold/30">
    
    <!-- Top Status Bar -->
    <nav class="fixed top-0 w-full z-50 glass px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-brand-gold rounded-lg flex items-center justify-center font-display font-extrabold text-slate-950">IB</div>
            <span class="font-display font-bold text-lg tracking-tight">INDRA BANK</span>
        </div>
        <div class="flex items-center space-x-2 px-3 py-1 rounded-full border border-brand-gold/20 bg-brand-gold/5 shield-active">
            <div class="w-1.5 h-1.5 rounded-full bg-brand-gold animate-ping"></div>
            <span class="text-[10px] font-bold text-brand-gold uppercase tracking-widest">BehaviorShield Active</span>
        </div>
    </nav>

    <main class="pt-24 pb-32 px-6 max-w-md mx-auto space-y-8">
        <!-- Dashboard View -->
        <div id="view-dashboard" class="page-transition space-y-8">
            <header>
                <h1 class="text-3xl font-display font-extrabold text-slate-100">Welcome, John Kumar</h1>
                <p class="text-slate-400 text-sm mt-1">Ac: 49XX XXXX XXXX 4521</p>
            </header>

            <!-- Main Balance Card -->
            <div class="relative group cursor-pointer">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-brand-gold to-amber-600 rounded-3xl blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
                <div class="relative bg-slate-900 border border-slate-800 p-8 rounded-3xl space-y-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] font-bold text-brand-gold uppercase tracking-[0.2em] mb-1">Available Balance</p>
                            <h2 class="text-4xl font-display font-extrabold tracking-tight">INR3,42,580.00</h2>
                        </div>
                        <div class="p-3 bg-slate-800 rounded-2xl">
                            <svg class="w-6 h-6 text-brand-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-18c-5.523 0-10 4.477-10 10s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2z"/></svg>
                        </div>
                    </div>
                    <div class="flex space-x-4">
                        <button onclick="switchView('transfer')" class="flex-1 bg-brand-gold py-3 rounded-xl text-slate-950 font-bold text-sm hover:scale-[1.02] active:scale-95 transition-all">Transfer</button>
                        <button class="flex-1 bg-slate-800 py-3 rounded-xl text-slate-100 font-bold text-sm hover:bg-slate-700 transition-all text-center">Details</button>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <section class="space-y-4">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest px-1 text-center">Behavioral Snapshot</h3>
                <div class="grid grid-cols-4 gap-4">
                    <div class="flex flex-col items-center space-y-2">
                        <div class="w-14 h-14 bg-slate-900 border border-slate-800 rounded-2xl flex items-center justify-center text-xl">📱</div>
                        <span class="text-[10px] font-bold text-slate-500">Device</span>
                    </div>
                    <div class="flex flex-col items-center space-y-2">
                        <div class="w-14 h-14 bg-slate-900 border border-slate-800 rounded-2xl flex items-center justify-center text-xl">⌨️</div>
                        <span class="text-[10px] font-bold text-slate-500">Typing</span>
                    </div>
                    <div class="flex flex-col items-center space-y-2">
                        <div class="w-14 h-14 bg-slate-900 border border-slate-800 rounded-2xl flex items-center justify-center text-xl">📍</div>
                        <span class="text-[10px] font-bold text-slate-500">Loc</span>
                    </div>
                    <div class="flex flex-col items-center space-y-2">
                        <div class="w-14 h-14 bg-slate-900 border border-slate-800 rounded-2xl flex items-center justify-center text-xl">⚡</div>
                        <span class="text-[10px] font-bold text-slate-500">Action</span>
                    </div>
                </div>
            </section>
        </div>

        <!-- Transfer View (Hidden by default) -->
        <div id="view-transfer" class="hidden page-transition space-y-8">
            <header class="flex items-center space-x-4">
                <button onclick="switchView('dashboard')" class="p-2 bg-slate-900 rounded-lg text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h1 class="text-2xl font-display font-extrabold text-slate-100 uppercase tracking-tight">Secure Transfer</h1>
            </header>

            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Recipient Account</label>
                    <input type="text" placeholder="Julian Smith (Verified)" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl text-slate-100 placeholder:text-slate-600 focus:outline-none focus:border-brand-gold/50 transition-colors" value="JULIAN SMITH">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Amount</label>
                    <div class="relative">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-2xl font-display font-extrabold text-brand-gold">INR</span>
                        <input type="number" placeholder="0.00" class="w-full bg-slate-900 border border-slate-800 p-8 pl-20 rounded-2xl text-4xl font-display font-extrabold text-slate-100 focus:outline-none focus:border-brand-gold/50 transition-colors" value="15000">
                    </div>
                    <p class="text-[10px] text-slate-500 text-right italic mt-2">-- Daily Limit Remaining: INR1,42,850.00</p>
                </div>

                <button onclick="executeTransfer()" class="w-full bg-brand-gold py-6 rounded-2xl text-slate-950 font-display font-black text-lg shadow-xl shadow-brand-gold/10 hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-widest">
                    Confirm & Send
                </button>
            </div>
        </div>

        <!-- Success Animation View (Hidden) -->
        <div id="view-success" class="hidden page-transition flex flex-col items-center justify-center py-20 space-y-6">
            <div class="w-24 h-24 bg-brand-gold/10 border-4 border-brand-gold rounded-full flex items-center justify-center animate-bounce">
                <svg class="w-12 h-12 text-brand-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
            </div>
            <div class="text-center">
                <h2 class="text-2xl font-display font-extrabold text-slate-100">[DONE] Transfer Success</h2>
                <p class="text-slate-500 mt-2">Transaction ID: SH-8E8DF0F1</p>
            </div>
            <button onclick="switchView('dashboard')" class="mt-8 px-8 py-3 bg-slate-900 border border-slate-800 rounded-xl font-bold text-sm text-slate-400">Back to Dashboard</button>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full z-50 glass rounded-t-[2.5rem] px-8 py-6 pb-12 flex justify-between items-center">
        <a href="#" class="text-brand-gold flex flex-col items-center"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
        <a href="#" class="text-slate-500 flex flex-col items-center"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></a>
        <div class="w-12 h-12 bg-brand-gold rounded-full flex items-center justify-center -mt-12 gold-glow border-4 border-slate-950 font-bold text-slate-950 text-xl cursor-pointer">+</div>
        <a href="#" class="text-slate-500 flex flex-col items-center"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></a>
        <a href="#" class="text-slate-500 flex flex-col items-center"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></a>
    </nav>

    <script>
        function switchView(view) {
            const dashboard = document.getElementById('view-dashboard');
            const transfer = document.getElementById('view-transfer');
            const success = document.getElementById('view-success');

            dashboard.classList.add('hidden');
            transfer.classList.add('hidden');
            success.classList.add('hidden');

            const target = document.getElementById('view-' + view);
            target.classList.remove('hidden');
            target.classList.add('animate-in', 'fade-in', 'slide-in-from-bottom-4');
        }

        function executeTransfer() {
            // Mock execution with 47-feature behavioral drift simulation logic
            console.log("Transmitting 47-feature behavioral snapshot...");
            switchView('success');
        }
    </script>
</body>
</html>
